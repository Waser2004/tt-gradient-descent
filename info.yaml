# Tiny Tapeout project information
project:
  title:        "Gradient Descent"      # Project title
  author:       "Waser Nico"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Performs gradient descent on a linear model, given your inputs"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25175000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_linear_model"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"
    - "data_loader.v"
    - "train.v"
    - "inference.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  ui[0]: "Data input bit 0"
  ui[1]: "Data input bit 1"
  ui[2]: "Data input bit 2"
  ui[3]: "Data input bit 3"
  ui[4]: "Data input bit 4"
  ui[5]: "Data input bit 5"
  ui[6]: "Load toggle"
  ui[7]: "Start load / return to idle"

  uo[0]: "Output bit 0"
  uo[1]: "Output bit 1"
  uo[2]: "Output bit 2"
  uo[3]: "Output bit 3"
  uo[4]: "Output bit 4"
  uo[5]: "Output bit 5"
  uo[6]: "State bit 0 / output bit 6"
  uo[7]: "State bit 1 / output bit 7"

  uio[0]: "Unused"
  uio[1]: "Unused"
  uio[2]: "Unused"
  uio[3]: "Unused"
  uio[4]: "Unused"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

# Do not change!
yaml_version: 6
